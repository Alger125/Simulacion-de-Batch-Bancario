# Archivo de propiedades SQL del Job LOXJ162-01-MX
# Fuente de verdad para el classpath del fat JAR (lox-beans.xml lo carga
# como classpath:sql-LOXBR001IMP.properties)

# 1. Consulta Principal (Reader) - recibe odate como parametro posicional
sql.select.verificacion_de_datos=SELECT \
c.NOMBRE, \
cu.CUENTA_ID as NUMERO_CUENTA, \
m.MONTO \
FROM MOVIMIENTOS_BBVA m \
JOIN CUENTAS_BBVA cu ON m.CLIENTE_ID = cu.CLIENTE_ID \
JOIN CLIENTES_BBVA c ON cu.CLIENTE_ID = c.CLIENTE_ID \
WHERE TRUNC(m.FECHA) = TO_DATE(?, 'YYYYMMDD')

# 2. Consulta Dependiente (Processor) - Detalle de Saldo por Cuenta
sql.select.detalle_saldos_cuenta=SELECT \
SALDO_DISPONIBLE, \
FECHA_ULTIMO_MOVIMIENTO, \
LIMITE_CREDITO \
FROM SALDOS \
WHERE NUMERO_CUENTA = ? \
AND ESTATUS_SALDO = 'VIGENTE'
